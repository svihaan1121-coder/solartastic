<!-- Image hack to automatically execute JS when fetched via innerHTML -->
<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="display:none;" onerror="(function(){
    const btn = document.getElementById('nav-search-btn');
    const container = document.getElementById('search-container-element');
    const input = document.getElementById('nav-search-input');
    const resultsBox = document.getElementById('nav-search-results');

    if (!btn || !container || !input || !resultsBox) return;

    // Toggle expand
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!container.classList.contains('expanded')) {
            container.classList.add('expanded');
            input.focus();
        }
    });

    // Close on click outside
    document.addEventListener('click', function(e) {
        if (!container.contains(e.target)) {
            container.classList.remove('expanded');
            resultsBox.style.display = 'none';
            input.value = '';
        }
    });

    // ESC to collapse
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            container.classList.remove('expanded');
            resultsBox.style.display = 'none';
            input.value = '';
            input.blur();
        }
    });

    // Search items list
    const searchItems = [
        { title: 'Home', url: 'index.html', keywords: 'home main landing space solartastic center' },
        { title: 'Live Sessions', url: 'sessions.html', keywords: 'live classes video tutors reviews Alan Stern' },
        { title: 'Activities', url: 'activities.html', keywords: 'activities assignments earth venus mercury space mission' },
        { title: 'Mercury Module', url: 'Activities/P1.html', keywords: 'mercury first planet innermost assignment' },
        { title: 'Venus Module', url: 'Activities/P2.html', keywords: 'venus second planet greenhouse assignment' },
        { title: 'Earth Module', url: 'Activities/P3.html', keywords: 'earth third planet life assignment quiz' },
        { title: 'Games', url: 'game.html', keywords: 'play fun interactive game space mission asteroids stars' },
        { title: 'Educators', url: 'educators.html', keywords: 'educators screenshots creators help solartastic' },
        { title: 'Sign In', url: 'sign.html', keywords: 'login account connect' },
        { title: 'Sign Up', url: 'alreadySign.html', keywords: 'signup account create' }
    ];

    input.addEventListener('input', function() {
        const query = input.value.trim().toLowerCase();
        resultsBox.innerHTML = '';

        if (query.length < 2) {
            resultsBox.style.display = 'none';
            return;
        }

        const matches = searchItems.filter(function(item) {
            return item.title.toLowerCase().indexOf(query) !== -1 || item.keywords.toLowerCase().indexOf(query) !== -1;
        });

        if (matches.length > 0) {
            matches.forEach(function(item) {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = 'search-item';
                a.textContent = item.title;
                resultsBox.appendChild(a);
            });
            resultsBox.style.display = 'block';
        } else {
            const div = document.createElement('div');
            div.className = 'search-item no-results';
            div.textContent = 'No results found';
            resultsBox.appendChild(div);
            resultsBox.style.display = 'block';
        }
    });
})()"/>
