<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solartastic - Mission Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #000;
      color: white;
      font-family: 'Syncopate', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #nav-placeholder {
      position: fixed;
      top: 0;
      width: 100%;
      height: 80px;
      z-index: 100;
      background: #000;
    }
    .game-page-wrapper {
      display: flex;
      height: calc(100vh - 80px);
      width: 100vw;
      margin-top: 80px;
      position: relative;
    }
    .back-button {
      position: absolute;
      top: 0px;
      left: 20px;
      padding: 12px 24px;
      transform : translateY(-40px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      color: white;
      text-decoration: none;
      font-family: 'Syncopate', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      z-index: 1000;
      text-transform: uppercase;
    }
    .back-button:hover {
      background: white;
      color: black;
      border-color: white;
    }
    .tiles-sidebar {
      width: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      padding-left: 5vw;
      padding-top: 80px;
      z-index: 10;
    }
    .game-tile {
      width: 280px;
      padding: 25px;
      border-left: 2px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      transition: 0.4s ease;
    }
    .game-tile:hover,
    .game-tile.active {
      border-left: 2px solid #fff;
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(10px);
    }
    .game-tile h2 {
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.5;
    }
    .game-tile:hover h2,
    .game-tile.active h2 {
      opacity: 1;
    }
    .display-panel {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .display-panel.active {
      opacity: 1;
    }
    .slideshow-bg {
      position: relative;
      width: 90%;
      max-width: 750px;
      aspect-ratio: 16 / 9;
      border: 2px solid #333;
      border-radius: 4px;
      overflow: hidden;
      background: #050505;
      margin-bottom: 30px;
    }
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.8s;
    }
    .slide.active {
      opacity: 1;
    }
    .content-overlay {
      width: 90%;
      max-width: 750px;
      text-align: left;
    }
    .content-overlay h1 {
      font-size: 32px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .content-overlay p {
      font-family: sans-serif;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.6;
      margin-bottom: 25px;
    }
    .play-btn {
      padding: 15px 40px;
      background: #fff;
      color: #000;
      border: none;
      font-family: 'Syncopate', sans-serif;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
    }
    #gameModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #000;
      border: 1px solid #fff;
      width: 90%;
      max-width: 900px;
      height: 85vh;
      padding: 40px;
      position: relative;
      overflow-y: auto;
      text-align: center;
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 10;
    }
    .modal-content.game-active > .close-btn {
      display: none;
    }
    .crossword-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    .crossword-grid {
      display: grid;
      grid-template-columns: repeat(5, 50px);
      grid-template-rows: repeat(5, 50px);
      gap: 2px;
    }
    .crossword-cell {
      width: 50px;
      height: 50px;
      background: #fff;
      border: 1px solid #000;
      color: #000;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .black-cell {
      background: #000;
      border: none;
    }
    .clues {
      text-align: left;
      font-family: sans-serif;
      font-size: 14px;
      max-width: 250px;
    }
    .jeopardy-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-top: 20px;
    }
    .j-header {
      background: #000033;
      padding: 10px;
      font-size: 10px;
      border: 1px solid #fff;
    }
    .j-card {
      background: #000088;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid #fff;
      font-size: 14px;
      font-weight: bold;
      color: #ffcc00;
    }
    .j-card:hover {
      background: #0000ff;
    }
    #galactic-root {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    @keyframes gd-pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes gd-ping {
      75%,100% { transform: scale(2); opacity: 0; }
    }
    @keyframes gd-float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes gd-bouncein {
      0% { transform: scale(0) rotate(-6deg); }
      60% { transform: scale(1.2) rotate(-6deg); }
      100% { transform: scale(1) rotate(-6deg); }
    }
    @keyframes gd-crit {
      0%,100% { opacity: 1; transform: scale(1) rotate(3deg); }
      50% { opacity: 0.7; transform: scale(1.05) rotate(3deg); }
    }
    @keyframes gd-shake {
      0%,100% { transform: translateX(0); }
      10%,30%,50%,70%,90% { transform: translateX(-6px); }
      20%,40%,60%,80% { transform: translateX(6px); }
    }
    .gd-pulse { animation: gd-pulse 2s ease-in-out infinite; }
    .gd-ping { animation: gd-ping 1s cubic-bezier(0,0,0.2,1) infinite; }
    .gd-float { animation: gd-float 3s ease-in-out infinite; }
    .gd-bouncein { animation: gd-bouncein 0.4s ease-out forwards; }
    .gd-crit { animation: gd-crit 0.6s ease-in-out infinite; }
    .gd-shake { animation: gd-shake 0.5s ease-in-out; }
    .gd-mlabel { opacity: 0; transition: opacity 0.3s; }
    .gd-mwrap:hover .gd-mlabel { opacity: 1; }
    .modal-content.game-active { padding: 0; overflow: hidden; }
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #000000;
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div id="nav-placeholder"></div>
  <div class="game-page-wrapper">
    <a href="activities.html" class="back-button">&larr; EXIT TO MISSIONS</a>
    <div class="tiles-sidebar">
      <div class="game-tile" onmouseover="showGame(0)">
        <h2>SPACE MISSION</h2>
      </div>
      <div class="game-tile" onmouseover="showGame(1)">
        <h2>SPACE PUZZLE</h2>
      </div>
      <div class="game-tile" onmouseover="showGame(2)">
        <h2>SPACE JEOPARDY</h2>
      </div>
    </div>
    <div class="display-panel" id="mainDisplay">
      <div class="slideshow-bg" id="slideshow"></div>
      <div class="content-overlay">
        <h1 id="displayTitle"></h1>
        <p id="displayDesc"></p>
        <button class="play-btn" onclick="openGame()">PLAY MISSION</button>
      </div>
    </div>
  </div>
  <div id="gameModal">
    <div class="modal-content" id="modalContent">
      <span class="close-btn" onclick="closeGame()">[ CLOSE ]</span>
      <div id="gameContainer" style="width: 100%; height: 100%; position: relative"></div>
    </div>
  </div>

    <script type="text/babel" id="galactic-script">
      const { useState, useEffect, useMemo, useRef } = React;
      const mono = "'Share Tech Mono', monospace";
      const gdist = (a, b) =>
        Math.sqrt((a.left - b.left) ** 2 + (a.top - b.top) ** 2);

      const BlackHoleMonster = ({ diskColor = '#a855f7', size = 54 }) => {
        const canvasRef = useRef(null);
        const rafRef = useRef(null);
        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          const W = size, H = size;
          const cx = W / 2, cy = H / 2;
          let startTs = null;
          const draw = (ts) => {
            if (!startTs) startTs = ts;
            const elapsed = ts - startTs;
            ctx.clearRect(0, 0, W, H);
            const pulse = 1 + 0.07 * Math.sin(elapsed * 0.002);
            const diskOuter = W * 0.46 * pulse;
            const diskInner = W * 0.27 * pulse;
            const diskGrad = ctx.createRadialGradient(cx, cy, diskInner, cx, cy, diskOuter);
            diskGrad.addColorStop(0, diskColor + 'cc');
            diskGrad.addColorStop(0.35, diskColor + '88');
            diskGrad.addColorStop(0.7, diskColor + '33');
            diskGrad.addColorStop(1, diskColor + '00');
            ctx.beginPath();
            ctx.arc(cx, cy, diskOuter, 0, Math.PI * 2);
            ctx.fillStyle = diskGrad;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx, cy, diskOuter * 0.88, 0, Math.PI * 2);
            ctx.strokeStyle = diskColor + '44';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            const ringAlpha = Math.round((0.55 + 0.2 * Math.sin(elapsed * 0.003)) * 255).toString(16).padStart(2, '0');
            ctx.beginPath();
            ctx.arc(cx, cy, W * 0.25 * pulse, 0, Math.PI * 2);
            ctx.strokeStyle = diskColor + ringAlpha;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.22 * pulse);
            cg.addColorStop(0, 'rgba(0,0,0,1)');
            cg.addColorStop(0.4, 'rgba(0,0,20,0.95)');
            cg.addColorStop(0.7, 'rgba(20,0,40,0.6)');
            cg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath();
            ctx.arc(cx, cy, W * 0.22 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = cg;
            ctx.fill();
            rafRef.current = requestAnimationFrame(draw);
          };
          rafRef.current = requestAnimationFrame(draw);
          return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
        }, [size, diskColor]);
        return (
          <canvas ref={canvasRef} width={size} height={size} style={{ display: 'block', borderRadius: '50%' }} />
        );
      };

      const SwordIcon = ({ s = 18, c = 'white' }) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5" />
          <line x1="13" y1="19" x2="19" y2="13" />
          <line x1="16" y1="16" x2="20" y2="20" />
          <line x1="19" y1="21" x2="21" y2="19" />
        </svg>
      );
      const CrosshairIcon = ({ s = 18, c = 'white' }) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="22" y1="12" x2="18" y2="12" />
          <line x1="6" y1="12" x2="2" y2="12" />
          <line x1="12" y1="6" x2="12" y2="2" />
          <line x1="12" y1="22" x2="12" y2="18" />
        </svg>
      );
      const ZapIcon = ({ s = 28, c = '#c084fc' }) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
      );
      const RocketIcon = ({ s = 22, c = 'white', r = 0 }) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ transform: `rotate(${r}deg)` }}>
          <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" />
          <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" />
          <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0" />
          <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />
        </svg>
      );

      const GalacticDefense = ({ onClose }) => {
        const [phase, setPhase] = useState('exploration');
        const [pHp, setPHp] = useState(100);
        const [monster, setMonster] = useState(null);
        const [mHp, setMHp] = useState(100);
        const [question, setQuestion] = useState(null);
        const [showQ, setShowQ] = useState(false);
        const [msg, setMsg] = useState('Click anywhere to navigate your ship!');
        const [defeated, setDefeated] = useState([]);
        const [monsters, setMonsters] = useState([]);
        const [fumble, setFumble] = useState(false);
        const [attack, setAttack] = useState(false);
        const [dmg, setDmg] = useState(0);
        const [pos, setPos] = useState({ top: 85, left: 50 });
        const [sucking, setSucking] = useState(false);
        const [pDmgShow, setPDmgShow] = useState(false);
        const [pDmg, setPDmg] = useState(0);

        const stars = useMemo(() => {
          const mk = (n) => Array.from({ length: n }, () => ({
            top: Math.random() * 100, left: Math.random() * 100,
            op: Math.random() * 0.8 + 0.2, dur: Math.random() * 3 + 2,
          }));
          return { s: mk(120), m: mk(40), l: mk(15) };
        }, []);

        useEffect(() => { spawnMonsters(); }, []);

        useEffect(() => {
          if (phase !== 'exploration' || sucking || monsters.length === 0) return;
          for (const m of monsters) {
            if (defeated.includes(m.id)) continue;
            if (gdist(pos, m.pos) <= 14) { suck(m); break; }
          }
        }, [pos, monsters, defeated, phase, sucking]);

        const spawnMonsters = () => {
          const base = [
            { id: 1, name: 'Void Crawler', diskColor: '#4ade80' },
            { id: 2, name: 'Nebula Phantom', diskColor: '#a855f7' },
            { id: 3, name: 'Solar Flare', diskColor: '#f97316' },
            { id: 4, name: 'Black Hole Entity', diskColor: '#60a5fa' },
            { id: 5, name: 'Cosmic Horror', diskColor: '#f43f5e' },
          ];
          const placed = [];
          for (const m of base) {
            let p, ok = false, tries = 0;
            while (!ok && tries < 60) {
              const left = Math.random() > 0.5 ? Math.random() * 22 + 5 : Math.random() * 22 + 68;
              p = { top: Math.random() * 55 + 10, left };
              ok = placed.every((x) => gdist(p, x.pos) >= 18);
              tries++;
            }
            placed.push({ ...m, pos: p });
          }
          setMonsters(placed);
        };

        const suck = (m) => {
          setSucking(true);
          setMonster(m);
          setMsg(`GRAVITY WELL! Pulling into ${m.name}...`);
          setPos(m.pos);
          setTimeout(() => {
            setMHp(100);
            setPhase('battle');
            setMsg(`Engaging ${m.name}!`);
            setSucking(false);
          }, 2800);
        };

        const mapClick = (e) => {
          if (sucking) return;
          if (e.target.closest('.gd-mwrap')) return;
          const r = e.currentTarget.getBoundingClientRect();
          setPos({
            left: Math.max(4, Math.min(96, ((e.clientX - r.left) / r.width) * 100)),
            top: Math.max(4, Math.min(96, ((e.clientY - r.top) / r.height) * 100)),
          });
          setMsg('');
        };

        const questions = [
          { q: 'Which planet is known as the Red Planet?', a: 'Mars', opts: ['Venus', 'Mars', 'Jupiter', 'Saturn'] },
          { q: 'How many planets are in our solar system?', a: '8', opts: ['7', '8', '9', '10'] },
          { q: 'What is the closest star to Earth?', a: 'The Sun', opts: ['Proxima Centauri', 'Sirius', 'The Sun', 'Betelgeuse'] },
          { q: 'What galaxy do we live in?', a: 'Milky Way', opts: ['Andromeda', 'Milky Way', 'Triangulum', 'Whirlpool'] },
          { q: 'What is the largest planet in our solar system?', a: 'Jupiter', opts: ['Saturn', 'Neptune', 'Jupiter', 'Uranus'] },
          { q: 'What do we call a rock that burns up in the sky?', a: 'Meteor', opts: ['Comet', 'Asteroid', 'Meteor', 'Satellite'] },
          { q: 'How long does sunlight take to reach Earth?', a: '8 minutes', opts: ['8 seconds', '8 minutes', '8 hours', '8 days'] },
          { q: 'Which planet has the most visible rings?', a: 'Saturn', opts: ['Jupiter', 'Uranus', 'Neptune', 'Saturn'] },
          { q: 'A pattern of stars in the sky is called a…', a: 'Constellation', opts: ['Nebula', 'Galaxy', 'Constellation', 'Cluster'] },
          { q: 'What force keeps planets orbiting the Sun?', a: 'Gravity', opts: ['Magnetism', 'Friction', 'Gravity', 'Radiation'] },
          { q: 'Which planet spins on its side?', a: 'Uranus', opts: ['Neptune', 'Saturn', 'Mars', 'Uranus'] },
          { q: "NASA's most famous space telescope?", a: 'Hubble', opts: ['Kepler', 'Hubble', 'Webb', 'Spitzer'] },
        ];

        const doAttack = () => {
          const q = questions[Math.floor(Math.random() * questions.length)];
          setQuestion(q);
          setShowQ(true);
          setMsg('Calculating firing solution...');
        };

        const answer = (ans) => {
          const correct = ans === question.a;
          let newMHp = mHp, newPHp = pHp;
          if (correct) {
            const d = Math.floor(Math.random() * 11) + 25;
            newMHp = Math.max(0, mHp - d);
            setMHp(newMHp);
            setDmg(d);
            setAttack(true);
            setTimeout(() => setAttack(false), 1400);
            setMsg(`LASER HIT! ${d} damage!`);
          } else {
            setFumble(true);
            setTimeout(() => setFumble(false), 1400);
            setMsg(`MISFIRE! Answer: ${question.a}`);
          }
          setShowQ(false);
          setQuestion(null);
          setTimeout(() => {
            if (newMHp > 0) {
              const md = Math.floor(Math.random() * 11) + 15;
              newPHp = Math.max(0, pHp - md);
              setPHp(newPHp);
              setPDmg(md);
              setPDmgShow(true);
              setTimeout(() => setPDmgShow(false), 900);
              setMsg((p) => p + ` Shields hit: -${md}!`);
              setTimeout(() => {
                if (newPHp <= 0) { setPhase('defeat'); setMsg('Hull Critical... Ship Destroyed.'); }
              }, 900);
            } else {
              const newDef = [...defeated, monster.id];
              setDefeated(newDef);
              setPHp(100);
              if (newDef.length === monsters.length) {
                setPhase('victory');
                setMsg('Sector Clear. Galaxy Safe.');
              } else {
                setTimeout(() => {
                  setPhase('exploration');
                  setMsg('Target Destroyed. Shields Recharged.');
                  setPos((p) => ({ ...p, top: Math.min(92, p.top + 8) }));
                }, 1400);
              }
            }
          }, 1400);
        };

        const restart = () => {
          setPhase('exploration');
          setPHp(100);
          setMonster(null);
          setMHp(100);
          setQuestion(null);
          setShowQ(false);
          setMsg('Click anywhere to navigate!');
          setDefeated([]);
          setPos({ top: 85, left: 50 });
          spawnMonsters();
        };

        const bgStyle = (c) => ({
          position: 'absolute', inset: 0,
          background: `radial-gradient(ellipse at ${c}, #0c1428 0%, #000 65%)`,
        });

        const Stars = () => (
          <>
            {stars.s.map((s, i) => (
              <div key={`gs${i}`} className="gd-pulse" style={{ position: 'absolute', top: `${s.top}%`, left: `${s.left}%`, width: 1, height: 1, borderRadius: '50%', background: '#fff', opacity: s.op, animationDuration: `${s.dur}s` }} />
            ))}
            {stars.m.map((s, i) => (
              <div key={`gm${i}`} className="gd-pulse" style={{ position: 'absolute', top: `${s.top}%`, left: `${s.left}%`, width: 2, height: 2, borderRadius: '50%', background: '#fff', opacity: s.op, animationDuration: `${s.dur}s` }} />
            ))}
            {stars.l.map((s, i) => (
              <div key={`gl${i}`} className="gd-pulse" style={{ position: 'absolute', top: `${s.top}%`, left: `${s.left}%`, width: 3, height: 3, borderRadius: '50%', background: '#dbeafe', opacity: s.op, boxShadow: '0 0 4px white', animationDuration: `${s.dur}s` }} />
            ))}
          </>
        );

        const wrap = { width: '100%', height: '100%', position: 'relative', overflow: 'hidden', fontFamily: mono, background: '#000' };

        if (phase === 'exploration')
          return (
            <div onClick={mapClick} style={{ ...wrap, cursor: 'crosshair', userSelect: 'none' }}>
              <div style={bgStyle('center')} />
              <Stars />

    <script>
      const gameData = [
        { title: 'SPACE MISSION', desc: 'Navigate your ship through hostile space. Engage enemy entities and answer space questions to destroy them.' },
        { title: 'SPACE PUZZLE', desc: 'Decode the cosmos — fill in the 5×5 crossword with space-themed answers across and down.' },
        { title: 'SPACE JEOPARDY', desc: 'Sector Intelligence: pick a category, answer correctly, and rack up points in this 6×6 Jeopardy board.' },
      ];

      let activeIndex = 0;
      let animationCleanup = null;

      function startMissionAnim(canvas) {
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const CYCLE = 12000;
        let start = null, raf;
        const stars = Array.from({ length: 100 }, () => ({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.8 + 0.3, op: Math.random() * 0.7 + 0.3, twinkle: Math.random() * Math.PI * 2 }));
        const nebulae = [
          { x: W * 0.15, y: H * 0.2, r: W * 0.18, c: 'rgba(120,40,180,0.06)' },
          { x: W * 0.8, y: H * 0.7, r: W * 0.22, c: 'rgba(20,80,200,0.07)' },
          { x: W * 0.5, y: H * 0.5, r: W * 0.3, c: 'rgba(0,60,120,0.05)' },
        ];
        const holes = [{ x: W * 0.22, y: H * 0.28 }, { x: W * 0.74, y: H * 0.55 }, { x: W * 0.5, y: H * 0.72 }, { x: W * 0.82, y: H * 0.22 }];
        const path = [{ x: W * 0.12, y: H * 0.85 }, { x: W * 0.3, y: H * 0.55 }, { x: W * 0.55, y: H * 0.2 }, { x: W * 0.68, y: H * 0.45 }, { x: W * 0.88, y: H * 0.35 }, { x: W * 0.75, y: H * 0.75 }, { x: W * 0.4, y: H * 0.88 }, { x: W * 0.12, y: H * 0.85 }];
        function posOnPath(t) {
          const segs = path.length - 1; const seg = Math.min(Math.floor(t * segs), segs - 1); const lt = t * segs - seg; const a = path[seg], b = path[seg + 1];
          return { x: a.x + (b.x - a.x) * lt, y: a.y + (b.y - a.y) * lt };
        }
        function drawRocket(x, y, angle, ts) {
          ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
          const flicker1 = 22 + Math.sin(ts * 0.025) * 5; const flicker2 = 14 + Math.sin(ts * 0.04 + 1) * 4;
          const flameGrad1 = ctx.createRadialGradient(0, 18, 0, 0, 22, flicker1);
          flameGrad1.addColorStop(0, 'rgba(255,220,80,0.95)'); flameGrad1.addColorStop(0.3, 'rgba(255,130,30,0.8)'); flameGrad1.addColorStop(0.7, 'rgba(200,50,0,0.4)'); flameGrad1.addColorStop(1, 'rgba(150,0,0,0)');
          ctx.beginPath(); ctx.ellipse(0, 18 + flicker1 * 0.3, 7, flicker1, 0, 0, Math.PI * 2); ctx.fillStyle = flameGrad1; ctx.fill();
          const flameGrad2 = ctx.createRadialGradient(0, 16, 0, 0, 18, flicker2);
          flameGrad2.addColorStop(0, 'rgba(255,255,200,1)'); flameGrad2.addColorStop(0.5, 'rgba(255,200,50,0.9)'); flameGrad2.addColorStop(1, 'rgba(255,100,0,0)');
          ctx.beginPath(); ctx.ellipse(0, 17, 4, flicker2, 0, 0, Math.PI * 2); ctx.fillStyle = flameGrad2; ctx.fill();
          const bodyGrad = ctx.createLinearGradient(-10, -22, 10, 10);
          bodyGrad.addColorStop(0, '#b8e8f8'); bodyGrad.addColorStop(0.3, '#38b2d8'); bodyGrad.addColorStop(0.7, '#0e7fa8'); bodyGrad.addColorStop(1, '#054b66');
          ctx.beginPath(); ctx.moveTo(-7, 6); ctx.lineTo(-7, -10); ctx.quadraticCurveTo(-7, -14, 0, -22); ctx.quadraticCurveTo(7, -14, 7, -10); ctx.lineTo(7, 6); ctx.closePath(); ctx.fillStyle = bodyGrad; ctx.fill();
          ctx.strokeStyle = 'rgba(150,230,255,0.6)'; ctx.lineWidth = 0.8; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-4, -8); ctx.lineTo(-4, 4); ctx.strokeStyle = 'rgba(200,240,255,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
          const cockpitGrad = ctx.createRadialGradient(-1.5, -12, 0, 0, -11, 5);
          cockpitGrad.addColorStop(0, 'rgba(180,240,255,0.95)'); cockpitGrad.addColorStop(0.4, 'rgba(50,150,220,0.8)'); cockpitGrad.addColorStop(1, 'rgba(10,60,120,0.9)');
          ctx.beginPath(); ctx.ellipse(0, -12, 4, 5, 0, 0, Math.PI * 2); ctx.fillStyle = cockpitGrad; ctx.fill(); ctx.strokeStyle = 'rgba(100,200,255,0.8)'; ctx.lineWidth = 0.8; ctx.stroke();
          ctx.beginPath(); ctx.ellipse(-1.5, -14, 1.2, 1.8, -0.4, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();
          const wingGradL = ctx.createLinearGradient(-18, 0, -7, 8); wingGradL.addColorStop(0, '#1a6080'); wingGradL.addColorStop(1, '#0a3550');
          ctx.beginPath(); ctx.moveTo(-7, -2); ctx.lineTo(-18, 8); ctx.lineTo(-16, 12); ctx.lineTo(-7, 8); ctx.closePath(); ctx.fillStyle = wingGradL; ctx.fill(); ctx.strokeStyle = 'rgba(100,200,240,0.4)'; ctx.lineWidth = 0.7; ctx.stroke();

          container.style.cssText = 'width:100%;height:100%;position:relative;';
          const gameDiv = document.createElement('div');
          gameDiv.style.cssText = 'width:100%;height:100%;';
          container.appendChild(gameDiv);
          setTimeout(() => { gdRoot = window.mountGalacticDefense(gameDiv, closeGame); }, 50);
        } else if (activeIndex === 1) {
          content.classList.remove('game-active');
          container.innerHTML = `
            <h2 style="margin-bottom:20px;">COSMIC MINI CROSSWORD</h2>
            <div class="crossword-container">
              <div class="crossword-grid">
                ${Array(25).fill(0).map((_, i) => [4, 9, 14, 19, 24].includes(i) ? '<div class="black-cell"></div>' : '<input class="crossword-cell" maxlength="1">').join('')}
              </div>
              <div class="clues">
                <p><strong>ACROSS</strong></p><p>1. Our local star</p><p>2. The Red Planet</p><p>3. Path around a planet</p><p>4. Earth's satellite</p><br>
                <p><strong>DOWN</strong></p><p>1. Opposite of West</p><p>2. Space agency</p><p>3. Not a planet anymore (Pluto)</p>
              </div>
            </div>`;
        } else if (activeIndex === 2) {
          content.classList.remove('game-active');
          const categories = ['PLANETS', 'STARS', 'MOONS', 'HISTORY', 'GALAXIES', 'PHYSICS'];
          const values = [100, 200, 300, 400, 500, 600];
          let gridHTML = '<div class="jeopardy-grid">';
          categories.forEach((cat) => (gridHTML += `<div class="j-header">${cat}</div>`));
          values.forEach((val) => { categories.forEach((cat) => { gridHTML += `<div class="j-card" onclick="alert('${cat} for ${val}')">$${val}</div>`; }); });
          gridHTML += '</div>';
          container.innerHTML = `<h2>SPACE JEOPARDY</h2>${gridHTML}`;
        }
      }

      let gdRoot = null;

      function closeGame() {
        document.getElementById('gameModal').style.display = 'none';
        document.getElementById('modalContent').classList.remove('game-active');
        if (gdRoot) { gdRoot.unmount(); gdRoot = null; }
        document.getElementById('gameContainer').innerHTML = '';
      }

      showGame(0);
    </script>

    <script>
      const starfield = document.getElementById('starfield');
      const starCtx = starfield.getContext('2d');
      let sfWidth, sfHeight, sfStars = [];
      const STAR_COUNT = 800;
      function sfInit() {
        sfWidth = window.innerWidth; sfHeight = window.innerHeight;
        starfield.width = sfWidth; starfield.height = sfHeight;
        sfStars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
          sfStars.push({ x: Math.random() * sfWidth - sfWidth / 2, y: Math.random() * sfHeight - sfHeight / 2, z: Math.random() * sfWidth });
        }
      }
      function sfDraw() {
        starCtx.fillStyle = '#000000'; starCtx.fillRect(0, 0, sfWidth, sfHeight);
        for (let i = 0; i < STAR_COUNT; i++) {
          let s = sfStars[i]; s.z -= 1.5;
          if (s.z <= 0) { s.z = sfWidth; s.x = Math.random() * sfWidth - sfWidth / 2; s.y = Math.random() * sfHeight - sfHeight / 2; }
          const px = (s.x / s.z) * sfWidth + sfWidth / 2, py = (s.y / s.z) * sfHeight + sfHeight / 2;
          const size = (1 - s.z / sfWidth) * 3, opacity = 1 - s.z / sfWidth;
          starCtx.fillStyle = `rgba(255,255,255,${opacity})`; starCtx.beginPath(); starCtx.arc(px, py, size, 0, Math.PI * 2); starCtx.fill();
        }
        requestAnimationFrame(sfDraw);
      }
      window.addEventListener('resize', sfInit);
      sfInit(); sfDraw();
    </script>
  </body>
</html>
