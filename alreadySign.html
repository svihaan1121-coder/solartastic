<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solartastic - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
    <zapier-interfaces-chatbot-embed is-popup='true' chatbot-id='cmm53hwox0025k1ttzfc6dtm7'></zapier-interfaces-chatbot-embed>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.61/build/spline-viewer.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Syncopate', sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        /* --- Page Glow Effect (Behind Sun) --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at -20% -20%, rgba(255, 150, 0, 0.4), transparent 70%),
                        linear-gradient(to bottom, rgba(255, 50, 0, 0.1), #000 30%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1; /* Lowest z-index */
        }

        /* --- Spline Sun Styling (On top of Glow) --- */
        #spline-sun {
            position: fixed;
            top: 0;
            left: 0;
            width: 600px;
            height: 600px;
            z-index: 2; /* Middle z-index (Above glow) */
            pointer-events: none;
            transform: translate(-500px, -500px) rotate(-30deg);
            transition: transform 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #spline-sun.sun-visible {
            transform: translate(-150px, -200px) rotate(0deg);
        }

        body.sun-active::before {
            opacity: 1;
        }

        /* --- Astronaut Overlay Styling --- */
        .astronaut-container {
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 140px;
            height: 170px;
            z-index: 2;
            pointer-events: none;
            transition: all 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .astronaut-placeholder {
            display: inline-block;
            animation: floatAstronaut 5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.35));
        }

        @keyframes floatAstronaut {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(4deg); }
        }

        .astronaut-container.astronaut-visible {
            bottom: 50px;
            right: 50px;
        }

        .astronaut-container.astronaut-visible .smile-face {
            opacity: 1 !important;
        }

        /* --- Page Positioning --- */
        .page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 60px;
            position: relative;
            z-index: 10; /* Highest z-index (Above Sun) */
            padding-top: 150px;
        }

        .box { 
            background: #0a0a0a; 
            padding: 60px;
            border-radius: 20px; 
            width: 90%;
            max-width: 500px;
            border: 1px solid #222; 
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        h1 { text-align: center; margin-bottom: 40px; font-weight: 700; letter-spacing: 2px; }
        
        .form-group { margin-bottom: 25px; }
        
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;}
        
        input { 
            width: 100%; 
            padding: 15px;
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #151515; 
            color: white; 
            font-family: sans-serif;
            font-size: 16px;
        }
        
        input:focus { outline: 1px solid #0096ff; border-color: #0096ff; }
        
        .submit-btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 8px; 
            border: none; 
            background: white; 
            color: black; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #0096ff; color: white; box-shadow: 0 0 15px rgba(0, 150, 255, 0.5); }
        
        .error-message { color: #ff4757; font-size: 12px; margin-top: 15px; display: none; text-align: center; font-family: sans-serif; }
        
        .signup-text {
            text-align: center; margin-top: 25px; font-family: sans-serif; font-size: 13px; color: #aaa;
        }
        .signup-text a { color: white; text-decoration: none; font-weight: bold; }
        .signup-text a:hover { text-decoration: underline; }

        /* Footer Positioning */
        #footer-placeholder {
            margin-top: auto;
            padding: 20px;
            width: 100%;
            text-align: center;
            z-index: 1000;
            position: relative;
        }
    </style>
</head>
<body>
    
    <spline-viewer id="spline-sun" url="https://prod.spline.design/ERNq44jxZstmtZiZ/scene.splinecode"></spline-viewer>

    <!-- Floating Astronaut Page Overlay -->
    <div class="astronaut-container" id="page-astronaut">
        <div class="astronaut-placeholder">
            <!-- Premium Inline SVG Astronaut Silhouette -->
            <svg class="astronaut-svg" viewBox="0 0 100 120" width="130" height="150" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="glow-cyan-corner" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <filter id="glow-visor-corner" x="-10%" y="-10%" width="120%" height="120%">
                        <feGaussianBlur stdDeviation="2" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- Backpack -->
                <rect x="25" y="45" width="50" height="55" rx="10" fill="#cbd5e1" stroke="#1e293b" stroke-width="3" />
                <rect x="32" y="38" width="12" height="10" rx="3" fill="#64748b" stroke="#1e293b" stroke-width="2.5" />
                <rect x="56" y="38" width="12" height="10" rx="3" fill="#64748b" stroke="#1e293b" stroke-width="2.5" />
                
                <!-- Suit Body -->
                <rect x="30" y="50" width="40" height="45" rx="15" fill="#f1f5f9" stroke="#1e293b" stroke-width="3" />
                
                <!-- Suit Detail Lines -->
                <line x1="30" y1="62" x2="70" y2="62" stroke="#cbd5e1" stroke-width="3" />
                <line x1="30" y1="75" x2="70" y2="75" stroke="#cbd5e1" stroke-width="3" />
                
                <!-- Control Chest Panel -->
                <rect x="42" y="58" width="16" height="12" rx="3" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
                <circle cx="47" cy="64" r="2" fill="#00d2ff" filter="url(#glow-cyan-corner)" />
                <circle cx="53" cy="64" r="2" fill="#ef4444" />
                
                <!-- Helmet Connection Collar -->
                <ellipse cx="50" cy="48" rx="22" ry="4" fill="#64748b" stroke="#1e293b" stroke-width="2.5" />
                
                <!-- Helmet -->
                <circle cx="50" cy="34" r="18" fill="#f8fafc" stroke="#1e293b" stroke-width="3" />
                <!-- Visor -->
                <path d="M37 32 C37 22, 63 22, 63 32 C63 38, 37 38, 37 32 Z" fill="#0f172a" stroke="#00d2ff" stroke-width="2.5" filter="url(#glow-visor-corner)" />
                <!-- Visor Reflection -->
                <path d="M41 28 Q 50 25, 59 28" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" fill="none" stroke-linecap="round" />
                
                <!-- Smiling Face detailing inside visor -->
                <g class="smile-face" style="opacity: 0; transition: opacity 0.3s ease;">
                    <circle cx="46" cy="31" r="1.2" fill="#00d2ff" />
                    <circle cx="54" cy="31" r="1.2" fill="#00d2ff" />
                    <path d="M 45 34 Q 50 37, 55 34" stroke="#00d2ff" stroke-width="1.2" fill="none" stroke-linecap="round" />
                </g>

                <!-- Arms -->
                <!-- Left Arm -->
                <path d="M30 55 C18 58, 12 70, 22 75 C25 76, 28 72, 28 68" fill="#f1f5f9" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />
                <!-- Left Glove -->
                <circle cx="20" cy="74" r="5" fill="#64748b" stroke="#1e293b" stroke-width="2" />
                
                <!-- Right Arm -->
                <path d="M70 55 C82 58, 88 70, 78 75 C75 76, 72 72, 72 68" fill="#f1f5f9" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />
                <!-- Right Glove -->
                <circle cx="80" cy="74" r="5" fill="#64748b" stroke="#1e293b" stroke-width="2" />
                
                <!-- Legs -->
                <!-- Left Leg -->
                <rect x="34" y="90" width="12" height="18" rx="4" fill="#f1f5f9" stroke="#1e293b" stroke-width="3" />
                <!-- Left Boot -->
                <rect x="32" y="105" width="15" height="7" rx="3" fill="#475569" stroke="#1e293b" stroke-width="2.5" />
                
                <!-- Right Leg -->
                <rect x="54" y="90" width="12" height="18" rx="4" fill="#f1f5f9" stroke="#1e293b" stroke-width="3" />
                <!-- Right Boot -->
                <rect x="53" y="105" width="15" height="7" rx="3" fill="#475569" stroke="#1e293b" stroke-width="2.5" />
            </svg>
        </div>
    </div>

    <div id="nav-placeholder"></div>

    <div class="page-wrapper">
        <div class="box" id="signUpBox">
            <h1>SIGN UP</h1>
            <form id="signUpForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
            <p id="errorMessage" class="error-message"></p>
            <p class="signup-text">Already have an account? <a href="sign.html">Sign in</a></p>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // --- FETCH NAV AND FOOTER ---
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });
        
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

        // --- SUN & ASTRONAUT ANIMATION LOGIC ---
        const signUpBox = document.getElementById('signUpBox');
        const sun = document.getElementById('spline-sun');
        const astronaut = document.getElementById('page-astronaut');
        const body = document.body;

        signUpBox.addEventListener('mouseenter', () => {
            sun.classList.add('sun-visible');
            astronaut.classList.add('astronaut-visible');
            body.classList.add('sun-active');
        });

        signUpBox.addEventListener('mouseleave', () => {
            sun.classList.remove('sun-visible');
            astronaut.classList.remove('astronaut-visible');
            body.classList.remove('sun-active');
        });

        // --- FIREBASE LOGIC ---
        const firebaseConfig = {
            apiKey: "AIzaSyCl8wecK3hMID2yamyKfI2sDXE6LjMkDm4",
            authDomain: "neurolearn-dbf7b.firebaseapp.com",
            projectId: "neurolearn-dbf7b",
            storageBucket: "neurolearn-dbf7b.appspot.com",
            messagingSenderId: "746504792706",
            appId: "1:746504792706:web:0ffe714b05fc0bbf37a29b"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const signUpForm = document.getElementById('signUpForm');
        const errorMessage = document.getElementById('errorMessage');

        signUpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    username: username
                });
                window.location.href = 'sign.html'; 
            } catch (error) {
                console.error("Signup error:", error);
                errorMessage.textContent = error.code === 'auth/email-already-in-use' ? "Email already in use." : "Failed to create account.";
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
