<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solartastic - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
    <zapier-interfaces-chatbot-embed is-popup='true' chatbot-id='cmm53hwox0025k1ttzfc6dtm7'></zapier-interfaces-chatbot-embed>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.61/build/spline-viewer.js"></script>

    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: 'Syncopate', sans-serif;
        background: #000;
        color: white;
        overflow-x: hidden;
    }

    /* --- Page Glow Effect (Behind Sun) --- */
    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at -20% -20%, rgba(255, 150, 0, 0.4), transparent 70%),
                    linear-gradient(to bottom, rgba(255, 50, 0, 0.1), #000 30%);
        pointer-events: none;
        opacity: 0;
        transition: opacity 1s ease-in-out;
        z-index: 1; /* Lowest z-index */
    }

    /* --- Spline Sun Styling (On top of Glow) --- */
    #spline-sun {
        position: fixed;
        top: 0;
        left: 0;
        width: 600px;
        height: 600px;
        z-index: 2; /* Middle z-index (Above glow) */
        pointer-events: none;
        transform: translate(-500px, -500px) rotate(-30deg);
        transition: transform 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #spline-sun.sun-visible {
        transform: translate(-150px, -200px) rotate(0deg);
    }

    body.sun-active::before {
        opacity: 1;
    }

    /* --- Page Positioning --- */
    .page-wrapper {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-bottom: 60px;
        position: relative;
        z-index: 10; /* Highest z-index (Above Sun) */
        padding-top: 100px;
    }

    .box { 
        background: #0a0a0a; 
        padding: 60px;
        border-radius: 20px; 
        width: 90%;
        max-width: 500px;
        border: 1px solid #222; 
        box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
        position: relative;
    }
    
    h1 { text-align: center; margin-bottom: 40px; font-weight: 700; letter-spacing: 2px; }
    .form-group { margin-bottom: 25px; }
    label { display: block; margin-bottom: 8px; color: #aaa; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;}
    input { 
        width: 100%; 
        padding: 15px;
        border-radius: 8px; 
        border: 1px solid #333; 
        background: #151515; 
        color: white; 
        font-family: sans-serif;
        font-size: 16px;
    }
    input:focus { outline: 1px solid #0096ff; border-color: #0096ff; }
    
    .submit-btn { 
        width: 100%; 
        padding: 15px; 
        border-radius: 8px; 
        border: none; 
        background: white; 
        color: black; 
        font-weight: bold; 
        cursor: pointer; 
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 14px;
        transition: 0.3s;
        margin-top: 10px;
    }
    .submit-btn:hover { background: #0096ff; color: white; box-shadow: 0 0 15px rgba(0, 150, 255, 0.5); }
    
    .error-message { color: #ff4757; font-size: 12px; margin-top: 15px; display: none; text-align: center; font-family: sans-serif; }
    
    .signup-text {
        text-align: center; margin-top: 25px; font-family: sans-serif; font-size: 13px; color: #aaa;
    }
    .signup-text a { color: white; text-decoration: none; font-weight: bold; }
    .signup-text a:hover { text-decoration: underline; }

    #footer-placeholder {
        margin-top: auto;
        padding: 20px;
        width: 100%;
        text-align: center;
        z-index: 1000;
        position: relative;
    }
</style>
</head>
<body>
    
    <spline-viewer id="spline-sun" url="https://prod.spline.design/ERNq44jxZstmtZiZ/scene.splinecode"></spline-viewer>

    <div id="nav-placeholder"></div>

    <div class="page-wrapper">
        <div class="box" id="loginBox">
            <h1>SIGN IN</h1>
            <form id="signInForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            <p id="errorMessage" class="error-message"></p>
            <p class="signup-text">Dont have an account? <a href="alreadySign.html">Sign up</a></p>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });
        
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

        const loginBox = document.getElementById('loginBox');
        const sun = document.getElementById('spline-sun');
        const body = document.body;

        loginBox.addEventListener('mouseenter', () => {
            sun.classList.add('sun-visible');
            body.classList.add('sun-active');
        });

        loginBox.addEventListener('mouseleave', () => {
            sun.classList.remove('sun-visible');
            body.classList.remove('sun-active');
        });

        const firebaseConfig = {
            apiKey: "AIzaSyCl8wecK3hMID2yamyKfI2sDXE6LjMkDm4",
            authDomain: "neurolearn-dbf7b.firebaseapp.com",
            projectId: "neurolearn-dbf7b",
            storageBucket: "neurolearn-dbf7b.appspot.com",
            messagingSenderId: "746504792706",
            appId: "1:746504792706:web:0ffe714b05fc0bbf37a29b"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const signInForm = document.getElementById('signInForm');
        const errorMessage = document.getElementById('errorMessage');

        signInForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'activities.html'; 
            } catch (error) {
                console.error("Sign in error:", error);
                errorMessage.textContent = "Invalid email or password.";
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
